<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Test Tour</title>
<style>
body{background:#0a0e1a;color:#fff;font-family:sans-serif;padding:20px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:100;
  display:flex;align-items:center;justify-content:center}
.box{background:#1a2a6c;border:2px solid gold;border-radius:16px;padding:20px;
  max-width:320px;text-align:center}
button{background:gold;color:#000;border:none;border-radius:8px;
  padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;margin:6px}
#log{margin-top:20px;font-size:12px;color:#aaa;line-height:1.8}
</style>
</head>
<body>
<h2>Test Tour Auto-Start</h2>
<p id="counter">Count: cargando...</p>
<button onclick="resetAndReload()">Reset contador y recargar</button>
<div id="log"></div>

<div class="overlay" id="tour" style="display:none">
  <div class="box">
    <h3>🎯 Tour de la App</h3>
    <p>Este es el tour automático</p>
    <button onclick="endTour()">Entendido</button>
  </div>
</div>

<script>
function log(msg){
  document.getElementById('log').innerHTML += '<br>' + msg;
  console.log(msg);
}

// Check counter
const count = parseInt(localStorage.getItem('test_count')||'0');
document.getElementById('counter').textContent = 'Aperturas: ' + count;
log('Contador actual: ' + count);

// Increment
localStorage.setItem('test_count', count+1);
log('Nuevo contador: ' + (count+1));

// Should show tour?
if(count < 4){
  log('✅ Mostrando tour (count=' + count + ' < 4)');
  setTimeout(()=>{
    document.getElementById('tour').style.display='flex';
    log('Tour visible!');
  }, 500);
} else {
  log('❌ Tour ya visto 4 veces, no muestra');
}

function endTour(){
  document.getElementById('tour').style.display='none';
  log('Tour cerrado');
}

function resetAndReload(){
  localStorage.removeItem('test_count');
  location.reload();
}
</script>
</body>
</html>
